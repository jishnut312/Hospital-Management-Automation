<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Management — Login</title>
  <meta name="description" content="Secure login portal for Hospital Management Automation System"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="bg-mesh"></div>

<main class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🏥</div>
      <div>
        <div class="login-logo-text">MediCore HMS</div>
        <div class="login-logo-sub">Hospital Management System</div>
      </div>
    </div>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to access the dashboard</p>

    <div class="login-hint">
      Demo: <strong>admin</strong> / <strong>password123</strong>
    </div>

    <div id="login-alert" class="alert alert-error"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="username">Username <span class="required">*</span></label>
        <input id="username" type="text" placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label for="password">Password <span class="required">*</span></label>
        <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <button id="login-btn" type="submit" class="btn btn-primary btn-full" style="margin-top:8px">
        Sign In
      </button>
    </form>
  </div>
</main>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('hms_token')) window.location.href = '/dashboard.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('login-btn');
    const alert = document.getElementById('login-alert');
    const user  = document.getElementById('username').value.trim();
    const pass  = document.getElementById('password').value;

    alert.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      localStorage.setItem('hms_token', data.token);
      localStorage.setItem('hms_user',  JSON.stringify({ name: data.name, role: data.role }));
      window.location.href = '/dashboard.html';
    } catch (err) {
      alert.textContent = err.message;
      alert.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
